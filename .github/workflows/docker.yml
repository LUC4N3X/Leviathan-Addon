name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - Dockerfile
      - package.json
      - package-lock.json
      - addon.js
      - manifest.js
      - worker.js
      - core/**
      - providers/**
      - public/**
      - browser-extension/**
      - edge-worker/**
      - .github/workflows/docker.yml
  pull_request:
    paths:
      - Dockerfile
      - package.json
      - package-lock.json
      - addon.js
      - manifest.js
      - worker.js
      - core/**
      - providers/**
      - public/**
      - browser-extension/**
      - edge-worker/**
      - .github/workflows/docker.yml
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the image to GitHub Container Registry
        type: boolean
        default: false

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SHOULD_PUSH: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish) }}

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.SHOULD_PUSH == 'true' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ env.SHOULD_PUSH == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
