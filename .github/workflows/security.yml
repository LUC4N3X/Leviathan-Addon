name: Security

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - addon.js
      - manifest.js
      - worker.js
      - core/**
      - providers/**
      - public/**
      - browser-extension/**
      - edge-worker/**
      - .github/workflows/security.yml
  pull_request:
    paths:
      - package.json
      - package-lock.json
      - addon.js
      - manifest.js
      - worker.js
      - core/**
      - providers/**
      - public/**
      - browser-extension/**
      - edge-worker/**
      - .github/workflows/security.yml
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  security-events: write

defaults:
  run:
    shell: bash

env:
  NPM_CONFIG_FUND: false

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request' && !github.event.repository.private
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # actions/dependency-review-action requires the repository "Dependency graph"
      # feature (Settings → Code security and analysis). When it is disabled the action
      # hard-errors with "Dependency review is not supported on this repository", which
      # leaves a failed step and an error annotation even on an otherwise green run.
      # Probe the dependency-graph compare API first so the review is skipped cleanly when
      # the feature is off, and runs as a real high-severity gate when it is on.
      - name: Probe dependency graph availability
        id: depgraph
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          code="$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/dependency-graph/compare/${BASE_SHA}...${HEAD_SHA}" || echo "000")"

          if [[ "$code" == "200" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Dependency graph is available; running dependency review."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Dependency review skipped::Dependency graph is unavailable (HTTP ${code}). Enable it at Settings → Code security and analysis → Dependency graph to activate this check."
          fi

      - name: Review dependency diff
        if: steps.depgraph.outputs.available == 'true'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  codeql:
    name: CodeQL
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
