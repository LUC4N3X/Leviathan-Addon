name: Security

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - addon.js
      - manifest.js
      - worker.js
      - core/**
      - providers/**
      - public/**
      - browser-extension/**
      - edge-worker/**
      - .github/workflows/security.yml
  pull_request:
    paths:
      - package.json
      - package-lock.json
      - addon.js
      - manifest.js
      - worker.js
      - core/**
      - providers/**
      - public/**
      - browser-extension/**
      - edge-worker/**
      - .github/workflows/security.yml
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  security-events: write

defaults:
  run:
    shell: bash

env:
  NPM_CONFIG_FUND: false

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request' && !github.event.repository.private
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency diff
        uses: actions/dependency-review-action@v4
        # Requires the repository "Dependency graph" feature (Settings → Code security).
        # When it is disabled the action errors with "Dependency review is not supported on
        # this repository". Keep the step non-blocking so the check reports green: it still
        # surfaces findings once the feature is enabled, but a disabled graph no longer fails
        # the PR. Step-level continue-on-error (vs job-level) is required for the check run
        # itself to be reported as successful.
        continue-on-error: true
        with:
          fail-on-severity: high

  codeql:
    name: CodeQL
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
