name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  NODE_ENV: test
  NPM_CONFIG_AUDIT: false
  NPM_CONFIG_FUND: false

jobs:
  quality:
    name: Quality gate · Node 22
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      source_changed: ${{ steps.changes.outputs.source_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect source changes
        id: changes
        run: |
          set -euo pipefail

          source_changed=false
          base=""
          head="${GITHUB_SHA}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            source_changed=true
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            base="${{ github.event.before }}"
          fi

          if [[ "$source_changed" != "true" ]]; then
            if [[ -n "$base" ]] && git cat-file -e "$base^{commit}" 2>/dev/null; then
              mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMR "$base" "$head")
            else
              mapfile -t changed_files < <(git ls-files)
            fi

            for file in "${changed_files[@]}"; do
              case "$file" in
                package.json|package-lock.json|addon.js|manifest.js|worker.js|Dockerfile|docker-compose*.yml|docker-compose*.yaml|edge-worker/*|core/*|providers/*|public/*|browser-extension/*|scripts/*|tests/*|.github/workflows/ci.yml)
                  source_changed=true
                  break
                  ;;
              esac
            done
          fi

          echo "source_changed=$source_changed" >> "$GITHUB_OUTPUT"

          if [[ "$source_changed" == "true" ]]; then
            echo "Source/runtime files changed: running Node quality gate."
          else
            echo "Only repository metadata changed: skipping Node install, lint and tests."
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.source_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        if: steps.changes.outputs.source_changed == 'true'
        run: npm ci

      - name: Check JavaScript syntax
        if: steps.changes.outputs.source_changed == 'true'
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files '*.js' '*.cjs' '*.mjs' ':!:node_modules/**' ':!:coverage/**' ':!:dist/**' ':!:build/**')

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No JavaScript files found."
            exit 0
          fi

          printf '%s\0' "${files[@]}" | xargs -0 -n 1 -P 4 node --check
          echo "Syntax OK: checked ${#files[@]} JavaScript files."

      - name: Run fast smoke tests
        if: steps.changes.outputs.source_changed == 'true'
        run: |
          node --test \
            tests/config_schema.test.js \
            tests/source_mode.test.js \
            tests/title_parser.test.js \
            tests/language_guard.test.js \
            tests/stream_quality_filters.test.js \
            tests/fingerprint_coherence.test.js \
            tests/scrapling_python_contract.test.js

  scrapling-python:
    name: Scrapling bypass · Python validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality
    if: needs.quality.outputs.source_changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python tooling
        run: python -m pip install --upgrade ruff

      - name: Validate Scrapling and curl_cffi Python sources
        env:
          PYTHON: python
        run: node scripts/check-python.js

  runtime:
    name: Runtime smoke · Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.19.x
          - 24.x

    steps:
      - name: Skip non-code change
        if: needs.quality.outputs.source_changed != 'true'
        run: |
          echo "Only repository metadata changed: runtime smoke skipped."

      - name: Checkout
        if: needs.quality.outputs.source_changed == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: needs.quality.outputs.source_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        if: needs.quality.outputs.source_changed == 'true'
        run: npm ci

      - name: Run runtime smoke tests
        if: needs.quality.outputs.source_changed == 'true'
        run: |
          node --test \
            tests/config_schema.test.js \
            tests/source_mode.test.js \
            tests/title_parser.test.js \
            tests/language_guard.test.js \
            tests/stream_quality_filters.test.js \
            tests/fingerprint_coherence.test.js
