name: CI

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  NODE_ENV: test
  NPM_CONFIG_AUDIT: false
  NPM_CONFIG_FUND: false

jobs:
  quality:
    name: Quality gate · Node 22
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint JavaScript syntax
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run test suite
        run: npm test

  runtime:
    name: Runtime smoke · Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.19.x
          - 24.x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test
