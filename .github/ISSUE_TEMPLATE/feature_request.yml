name: Feature request
description: Suggest a useful improvement for Leviathan
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the limitation or workflow pain.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Explain the behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Provider
        - Extractor
        - Debrid
        - Cache
        - UI
        - Docker
        - Security
        - Other
    validations:
      required: true
