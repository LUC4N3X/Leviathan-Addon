services:
  stremio-addon:
    image: leviathan-addon:latest
    container_name: leviathan
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    ports:
      - "7000:7000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 7000
      TZ: Europe/Rome
      RUST_SHIELD_ENABLED: ${RUST_SHIELD_ENABLED:-true}
      RUST_SHIELD_URL: ${RUST_SHIELD_URL:-http://rust-shield:8787}
      RUST_SHIELD_FIRST: ${RUST_SHIELD_FIRST:-true}
      RUST_SHIELD_FAIL_OPEN: ${RUST_SHIELD_FAIL_OPEN:-true}
      RUST_SHIELD_CACHE_ENABLED: ${RUST_SHIELD_CACHE_ENABLED:-true}
      RUST_SHIELD_TIMEOUT_MS: ${RUST_SHIELD_TIMEOUT_MS:-1800}
      RUST_SHIELD_NODE_TIMEOUT_MS: ${RUST_SHIELD_NODE_TIMEOUT_MS:-2300}
      RUST_SHIELD_CACHE_TTL_MS: ${RUST_SHIELD_CACHE_TTL_MS:-1200000}
      RUST_SHIELD_STALE_TTL_MS: ${RUST_SHIELD_STALE_TTL_MS:-3600000}
      CINEMACITY_RUST_SHIELD: ${CINEMACITY_RUST_SHIELD:-false}
      CINEMACITY_RUST_ACCEL: ${CINEMACITY_RUST_ACCEL:-true}
      CINEMACITY_RUST_ACCEL_RACE: ${CINEMACITY_RUST_ACCEL_RACE:-true}
      CINEMACITY_RUST_ACCEL_LISTING: ${CINEMACITY_RUST_ACCEL_LISTING:-true}
      CINEMACITY_RUST_ACCEL_SEARCH_GET: ${CINEMACITY_RUST_ACCEL_SEARCH_GET:-true}
      CINEMACITY_RUST_ACCEL_SITEMAP: ${CINEMACITY_RUST_ACCEL_SITEMAP:-true}
      CINEMACITY_RUST_ACCEL_TIMEOUT_MS: ${CINEMACITY_RUST_ACCEL_TIMEOUT_MS:-950}
      CINEMACITY_RUST_ACCEL_CACHE_TTL_MS: ${CINEMACITY_RUST_ACCEL_CACHE_TTL_MS:-900000}
      CINEMACITY_RUST_ACCEL_STALE_TTL_MS: ${CINEMACITY_RUST_ACCEL_STALE_TTL_MS:-3600000}
      CINEMACITY_CF_FALLBACK: ${CINEMACITY_CF_FALLBACK:-false}
      CINEMACITY_SEARCH_WARMUP: ${CINEMACITY_SEARCH_WARMUP:-false}
      CC_PROVIDER_TIMEOUT: ${CC_PROVIDER_TIMEOUT:-18000}
      CINEMACITY_SITEMAP_TIMEOUT_MS: ${CINEMACITY_SITEMAP_TIMEOUT_MS:-1400}
      CINEMACITY_SITEMAP_TOTAL_MS: ${CINEMACITY_SITEMAP_TOTAL_MS:-2300}
      CINEMACITY_SEARCH_GET_TIMEOUT_MS: ${CINEMACITY_SEARCH_GET_TIMEOUT_MS:-2400}
      CINEMACITY_SEARCH_GET_TOTAL_MS: ${CINEMACITY_SEARCH_GET_TOTAL_MS:-3800}
      CINEMACITY_SEARCH_POST_TIMEOUT_MS: ${CINEMACITY_SEARCH_POST_TIMEOUT_MS:-2600}
      CINEMACITY_SEARCH_POST_TOTAL_MS: ${CINEMACITY_SEARCH_POST_TOTAL_MS:-4300}
      CINEMACITY_QUICK_TITLE_SEARCH: ${CINEMACITY_QUICK_TITLE_SEARCH:-false}
      CINEMACITY_QUICK_TITLE_QUERIES: ${CINEMACITY_QUICK_TITLE_QUERIES:-3}
      CINEMACITY_AXIOS_ON_BLOCKED: ${CINEMACITY_AXIOS_ON_BLOCKED:-true}
      CINEMACITY_LISTING_SCAN: ${CINEMACITY_LISTING_SCAN:-true}
      CINEMACITY_LISTING_MAX_PAGES: ${CINEMACITY_LISTING_MAX_PAGES:-55}
      CINEMACITY_LISTING_CONCURRENCY: ${CINEMACITY_LISTING_CONCURRENCY:-3}
      CINEMACITY_LISTING_TIMEOUT_MS: ${CINEMACITY_LISTING_TIMEOUT_MS:-2200}
      CINEMACITY_LISTING_TOTAL_MS: ${CINEMACITY_LISTING_TOTAL_MS:-6500}
      CINEMACITY_LISTING_CACHE_TTL_MS: ${CINEMACITY_LISTING_CACHE_TTL_MS:-2700000}
      CINEMACITY_LISTING_PAGE_CACHE_TTL_MS: ${CINEMACITY_LISTING_PAGE_CACHE_TTL_MS:-1200000}
      EUROSTREAMING_URL: ${EUROSTREAMING_URL:-https://eurostream.ing}
      EUROSTREAMING_DEBUG: ${EUROSTREAMING_DEBUG:-true}
      ES_RESOLVE_ALL_HOSTS: ${ES_RESOLVE_ALL_HOSTS:-true}
      MEDIAFLOW_EXTRACTOR_PATH: ${MEDIAFLOW_EXTRACTOR_PATH:-/extractor/video}
      # MaxStream/uProt: compatibilità Kraken/MFP legacy. Non usare /extractor/video.m3u8.
      MEDIAFLOW_EXTRACTOR_HLS_PATH: ${MEDIAFLOW_EXTRACTOR_HLS_PATH:-/extractor/video}
      MEDIAFLOW_EXTRACTOR_HLS_HOSTS: ${MEDIAFLOW_EXTRACTOR_HLS_HOSTS:-}
      MEDIAFLOW_REDIRECT_STREAM: ${MEDIAFLOW_REDIRECT_STREAM:-true}
      MEDIAFLOW_API_PASSWORD: ${MEDIAFLOW_API_PASSWORD:-}
      EUROSTREAMING_DELTABIT_MFP_FALLBACK: ${EUROSTREAMING_DELTABIT_MFP_FALLBACK:-false}
      EUROSTREAMING_UPROT_FLARE_ENABLED: ${EUROSTREAMING_UPROT_FLARE_ENABLED:-false}
      UPROT_DEBUG: ${UPROT_DEBUG:-true}
    depends_on:
      rust-shield:
        condition: service_started
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7000/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s


  rust-shield:
    build:
      context: ./services/rust-shield
      dockerfile: Dockerfile
    container_name: leviathan-rust-shield
    restart: unless-stopped
    init: true
    mem_limit: ${RUST_SHIELD_MEM_LIMIT:-128m}
    cpus: ${RUST_SHIELD_CPUS:-0.50}
    environment:
      TZ: Europe/Rome
      RUST_LOG: ${RUST_SHIELD_LOG:-info}
      RUST_SHIELD_BIND: 0.0.0.0:8787
      RUST_SHIELD_TIMEOUT_MS: ${RUST_SHIELD_TIMEOUT_MS:-1800}
      RUST_SHIELD_CONNECT_TIMEOUT_MS: ${RUST_SHIELD_CONNECT_TIMEOUT_MS:-900}
      RUST_SHIELD_CLIENT_TIMEOUT_MS: ${RUST_SHIELD_CLIENT_TIMEOUT_MS:-2600}
      RUST_SHIELD_CACHE_MAX: ${RUST_SHIELD_CACHE_MAX:-2000}
      RUST_SHIELD_CACHE_TTL_MS: ${RUST_SHIELD_CACHE_TTL_MS:-1200000}
      RUST_SHIELD_STALE_TTL_MS: ${RUST_SHIELD_STALE_TTL_MS:-3600000}
      RUST_SHIELD_MAX_BODY_BYTES: ${RUST_SHIELD_MAX_BODY_BYTES:-2500000}
      RUST_SHIELD_POOL_MAX_IDLE_PER_HOST: ${RUST_SHIELD_POOL_MAX_IDLE_PER_HOST:-64}
      RUST_SHIELD_WARMUP_CONCURRENCY: ${RUST_SHIELD_WARMUP_CONCURRENCY:-4}
      RUST_SHIELD_ALLOW_PRIVATE: ${RUST_SHIELD_ALLOW_PRIVATE:-false}
    expose:
      - "8787"
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD", "/usr/local/bin/rust-shield", "healthcheck"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s
