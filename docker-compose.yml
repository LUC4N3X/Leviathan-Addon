services:
  stremio-addon:
    image: leviathan-addon:latest
    container_name: leviathan
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    ports:
      - "51377:7000"

    mem_limit: ${LEVIATHAN_MEM_LIMIT:-700m}
    memswap_limit: ${LEVIATHAN_MEMSWAP_LIMIT:-850m}
    cpus: "${LEVIATHAN_CPUS:-1.5}"
    pids_limit: 512
    env_file:
      - .env
    environment:
      NODE_ENV: "production"
      PORT: "7000"
      TZ: "Europe/Rome"
      MALLOC_ARENA_MAX: "2"
      UV_THREADPOOL_SIZE: "8"
      NODE_OPTIONS: "--max-old-space-size=${LEVI_NODE_OLD_SPACE_MB:-384} --max-semi-space-size=16"

      # RAM saver: keep all functions, but rely more on DB/shared cache and less on huge in-process caches.
      STREAM_CACHE_MAX_KEYS: "${STREAM_CACHE_MAX_KEYS:-3000}"
      RAW_CACHE_MAX_KEYS: "${RAW_CACHE_MAX_KEYS:-6000}"
      CLOUD_BUILD_CACHE_MAX_KEYS: "${CLOUD_BUILD_CACHE_MAX_KEYS:-2000}"
      RAW_STREAM_CACHE_MAX_KEYS: "${RAW_STREAM_CACHE_MAX_KEYS:-3000}"
      RAW_STREAM_CACHE_MAX_BYTES: "${RAW_STREAM_CACHE_MAX_BYTES:-262144}"
      SHARED_FETCH_INFLIGHT_MAX_ENTRIES: "${SHARED_FETCH_INFLIGHT_MAX_ENTRIES:-1024}"
      TIMED_CACHE_MAX_ENTRIES: "${TIMED_CACHE_MAX_ENTRIES:-900}"
      TEXT_PARSED_TITLE_CACHE_MAX: "${TEXT_PARSED_TITLE_CACHE_MAX:-2000}"
      TEXT_NORMALIZED_CACHE_MAX: "${TEXT_NORMALIZED_CACHE_MAX:-4000}"
      TEXT_LANGUAGE_CACHE_MAX: "${TEXT_LANGUAGE_CACHE_MAX:-4000}"
      RD_PROBE_CACHE_MAX_ENTRIES: "${RD_PROBE_CACHE_MAX_ENTRIES:-900}"
      LOCAL_AVAILABILITY_MAX_ENTRIES: "${LOCAL_AVAILABILITY_MAX_ENTRIES:-2500}"
      LOCAL_CHECK_MARKER_MAX_ENTRIES: "${LOCAL_CHECK_MARKER_MAX_ENTRIES:-900}"
      LOCAL_DB_LOOKUP_INFLIGHT_MAX_ENTRIES: "${LOCAL_DB_LOOKUP_INFLIGHT_MAX_ENTRIES:-600}"
      RD_CONCURRENCY: "${RD_CONCURRENCY:-4}"
      TB_CACHE_MAX_CONCURRENCY: "${TB_CACHE_MAX_CONCURRENCY:-2}"
      ENGINES_ENGINE_CONCURRENCY: "${ENGINES_ENGINE_CONCURRENCY:-3}"
      ENGINES_DETAIL_CONCURRENCY: "${ENGINES_DETAIL_CONCURRENCY:-5}"
      ENGINES_MAX_CONCURRENCY: "${ENGINES_MAX_CONCURRENCY:-8}"
      ENGINES_FINAL_RESULT_LIMIT: "${ENGINES_FINAL_RESULT_LIMIT:-180}"
      WEB_PROVIDER_DEBUG: "${WEB_PROVIDER_DEBUG:-false}"

      # Redis RAM saver: cache esterna sacrificabile con limite duro e auto-eviction.
      REDIS_ENABLED: "${REDIS_ENABLED:-true}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
      REDIS_CACHE_PREFIX: "${REDIS_CACHE_PREFIX:-leviathan:}"
      REDIS_CACHE_MAX_VALUE_BYTES: "${REDIS_CACHE_MAX_VALUE_BYTES:-524288}"
      REDIS_TIMEOUT_MS: "${REDIS_TIMEOUT_MS:-150}"
      REDIS_ERROR_COOLDOWN_MS: "${REDIS_ERROR_COOLDOWN_MS:-5000}"
      REDIS_LOCAL_HYDRATE_TTL: "${REDIS_LOCAL_HYDRATE_TTL:-120}"
      RAW_STREAM_REDIS_ENABLED: "${RAW_STREAM_REDIS_ENABLED:-true}"

      TMDB_API_KEY: "${TMDB_API_KEY:-}"

      EXT_TORRENTIO_MAIN_URL: ""
      EXT_TORRENTIO_MAIN_TIMEOUT: "4500"
      EXT_TORRENTIO_MIRROR_URL: ""
      EXT_TORRENTIO_MIRROR_TIMEOUT: "4500"
      EXT_TORRENTIO_MIRROR_TRUST_ITA: "false"

      EXTERNAL_SNAPSHOT_TTL: "${EXTERNAL_SNAPSHOT_TTL:-2592000}"
      EXTERNAL_SNAPSHOT_READ_LIMIT: "${EXTERNAL_SNAPSHOT_READ_LIMIT:-120}"

      TORRENTIO_SCAN_ENABLED: "false"
      TORRENTIO_SCAN_LEADER_ONLY: "true"
      TORRENTIO_SCAN_LANGUAGE: "it-IT"
      TORRENTIO_SCAN_REGION: "IT"
      TORRENTIO_SCAN_START_DELAY_SECONDS: "${TORRENTIO_SCAN_START_DELAY_SECONDS:-25}"
      TORRENTIO_SCAN_INTERVAL_SECONDS: "${TORRENTIO_SCAN_INTERVAL_SECONDS:-86400}"
      TORRENTIO_SCAN_WORKER_INTERVAL_SECONDS: "${TORRENTIO_SCAN_WORKER_INTERVAL_SECONDS:-2.5}"
      TORRENTIO_SCAN_MOVIE_ENDPOINTS: "${TORRENTIO_SCAN_MOVIE_ENDPOINTS:-popular,top_rated,now_playing,upcoming}"
      TORRENTIO_SCAN_SERIES_ENDPOINTS: "${TORRENTIO_SCAN_SERIES_ENDPOINTS:-popular,top_rated,on_the_air,airing_today}"
      TORRENTIO_SCAN_MOVIE_PAGES: "${TORRENTIO_SCAN_MOVIE_PAGES:-30}"
      TORRENTIO_SCAN_SERIES_PAGES: "${TORRENTIO_SCAN_SERIES_PAGES:-10}"
      TORRENTIO_SCAN_SERIES_MODE: "${TORRENTIO_SCAN_SERIES_MODE:-episodes}"
      TORRENTIO_SCAN_MAX_SEASONS_PER_SERIES: "${TORRENTIO_SCAN_MAX_SEASONS_PER_SERIES:-10}"
      TORRENTIO_SCAN_MAX_EPISODES_PER_SERIES: "${TORRENTIO_SCAN_MAX_EPISODES_PER_SERIES:-90}"
      TORRENTIO_SCAN_PAGE_DELAY_SECONDS: "${TORRENTIO_SCAN_PAGE_DELAY_SECONDS:-1.0}"
      TORRENTIO_SCAN_ITEM_DELAY_SECONDS: "${TORRENTIO_SCAN_ITEM_DELAY_SECONDS:-0.08}"
      TORRENTIO_SCAN_RETRY_SECONDS: "${TORRENTIO_SCAN_RETRY_SECONDS:-1800}"
      TORRENTIO_SCAN_REFRESH_SECONDS: "${TORRENTIO_SCAN_REFRESH_SECONDS:-604800}"
      TORRENTIO_SCAN_MAX_ATTEMPTS: "${TORRENTIO_SCAN_MAX_ATTEMPTS:-12}"
      TORRENTIO_SCAN_ONLY_ITALIAN: "true"
      TORRENTIO_SCAN_MIN_ITALIAN_CONFIDENCE: "35"
      TORRENTIO_SCAN_ADDONS: "torrentio_main,torrentio_mirror"
      TORRENTIO_SCAN_SERVICE: "rd"
      TORRENTIO_SCAN_RD_API_KEY: "${TORRENTIO_SCAN_RD_API_KEY:-}"
      TORRENTIO_SCAN_TB_API_KEY: "${TORRENTIO_SCAN_TB_API_KEY:-}"

      # Rust disattivato: non esiste più il servizio rust-shield nel compose.
      RUST_SHIELD_ENABLED: "false"
      RUST_SHIELD_URL: ""
      RUST_SHIELD_FIRST: "false"
      RUST_SHIELD_FAIL_OPEN: "true"
      RUST_SHIELD_CACHE_ENABLED: "false"

      FLARESOLVERR_URL: "http://flaresolverr:8191/v1"
      FLARESOLVERR_URLS: "http://flaresolverr:8191/v1"
      GUARDOSERIE_FLARE_ENABLED: "${GUARDOSERIE_FLARE_ENABLED:-true}"

      CINEMACITY_RUST_SHIELD: "false"
      CINEMACITY_RUST_ACCEL: "false"
      CINEMACITY_RUST_ACCEL_RACE: "false"
      CINEMACITY_RUST_ACCEL_LISTING: "false"
      CINEMACITY_RUST_ACCEL_SEARCH_GET: "false"
      CINEMACITY_RUST_ACCEL_SITEMAP: "false"

      CINEMACITY_CF_FALLBACK: "${CINEMACITY_CF_FALLBACK:-true}"
      CINEMACITY_BACKGROUND_CLEARANCE: "${CINEMACITY_BACKGROUND_CLEARANCE:-false}"
      CINEMACITY_FORCE_CLEARANCE_BEFORE_SEARCH: "${CINEMACITY_FORCE_CLEARANCE_BEFORE_SEARCH:-false}"
      CINEMACITY_SITEMAP_LOOKUP: "${CINEMACITY_SITEMAP_LOOKUP:-true}"
      CINEMACITY_SEARCH_POST_FIRST: "${CINEMACITY_SEARCH_POST_FIRST:-false}"
      CINEMACITY_PAGE_EXTRACTOR_HOST: "${CINEMACITY_PAGE_EXTRACTOR_HOST:-city}"
      CINEMACITY_PAGE_EXTRACTOR_LABEL: "${CINEMACITY_PAGE_EXTRACTOR_LABEL:-City}"
      CINEMACITY_PAGE_EXTRACTOR_PRIMARY: "${CINEMACITY_PAGE_EXTRACTOR_PRIMARY:-true}"
      CINEMACITY_MOVIE_PAGE_EXTRACTOR_PRIMARY: "${CINEMACITY_MOVIE_PAGE_EXTRACTOR_PRIMARY:-true}"
      CINEMACITY_SERIES_PAGE_EXTRACTOR_PRIMARY: "${CINEMACITY_SERIES_PAGE_EXTRACTOR_PRIMARY:-true}"
      CINEMACITY_SERIES_FORCE_CCDN: "${CINEMACITY_SERIES_FORCE_CCDN:-false}"
      CINEMACITY_FORWARD_PROXY: "${CINEMACITY_FORWARD_PROXY:-https://krakenproxy.questoleviatanormio.dpdns.org/forward?url=}"
      CINEMACITY_FORWARD_PROXY_ENABLED: "${CINEMACITY_FORWARD_PROXY_ENABLED:-true}"
      CINEMACITY_FORWARD_PROXY_FIRST: "${CINEMACITY_FORWARD_PROXY_FIRST:-false}"
      CINEMACITY_FORWARD_PROXY_TIMEOUT_MS: "${CINEMACITY_FORWARD_PROXY_TIMEOUT_MS:-6000}"
      CINEMACITY_SEARCH_WARMUP: "${CINEMACITY_SEARCH_WARMUP:-false}"
      CC_PROVIDER_TIMEOUT: "${CC_PROVIDER_TIMEOUT:-42000}"

      CINEMACITY_SITEMAP_TIMEOUT_MS: "${CINEMACITY_SITEMAP_TIMEOUT_MS:-1400}"
      CINEMACITY_SITEMAP_TOTAL_MS: "${CINEMACITY_SITEMAP_TOTAL_MS:-2300}"
      CINEMACITY_SEARCH_GET_TIMEOUT_MS: "${CINEMACITY_SEARCH_GET_TIMEOUT_MS:-2400}"
      CINEMACITY_SEARCH_GET_TOTAL_MS: "${CINEMACITY_SEARCH_GET_TOTAL_MS:-3800}"
      CINEMACITY_SEARCH_POST_TIMEOUT_MS: "${CINEMACITY_SEARCH_POST_TIMEOUT_MS:-2600}"
      CINEMACITY_SEARCH_POST_TOTAL_MS: "${CINEMACITY_SEARCH_POST_TOTAL_MS:-4300}"
      CINEMACITY_QUICK_TITLE_SEARCH: "${CINEMACITY_QUICK_TITLE_SEARCH:-true}"
      CINEMACITY_QUICK_TITLE_QUERIES: "${CINEMACITY_QUICK_TITLE_QUERIES:-3}"
      CINEMACITY_AXIOS_ON_BLOCKED: "${CINEMACITY_AXIOS_ON_BLOCKED:-true}"

      CINEMACITY_LISTING_SCAN: "${CINEMACITY_LISTING_SCAN:-true}"
      CINEMACITY_LISTING_MAX_PAGES: "${CINEMACITY_LISTING_MAX_PAGES:-55}"
      CINEMACITY_LISTING_CONCURRENCY: "${CINEMACITY_LISTING_CONCURRENCY:-3}"
      CINEMACITY_LISTING_TIMEOUT_MS: "${CINEMACITY_LISTING_TIMEOUT_MS:-2200}"
      CINEMACITY_LISTING_TOTAL_MS: "${CINEMACITY_LISTING_TOTAL_MS:-6500}"
      CINEMACITY_LISTING_CACHE_TTL_MS: "${CINEMACITY_LISTING_CACHE_TTL_MS:-2700000}"
      CINEMACITY_LISTING_PAGE_CACHE_TTL_MS: "${CINEMACITY_LISTING_PAGE_CACHE_TTL_MS:-1200000}"

      EUROSTREAMING_URL: "${EUROSTREAMING_URL:-https://eurostream.ing}"
      EUROSTREAMING_DEBUG: "${EUROSTREAMING_DEBUG:-false}"
      ES_RESOLVE_ALL_HOSTS: "${ES_RESOLVE_ALL_HOSTS:-true}"

      MEDIAFLOW_EXTRACTOR_PATH: "${MEDIAFLOW_EXTRACTOR_PATH:-/extractor/video}"
      MEDIAFLOW_CITY_EXTRACTOR_PATH: "${MEDIAFLOW_CITY_EXTRACTOR_PATH:-/extractor/video.m3u8}"
      MEDIAFLOW_CINEMACITY_EXTRACTOR_PATH: "${MEDIAFLOW_CINEMACITY_EXTRACTOR_PATH:-/extractor/video.m3u8}"
      MEDIAFLOW_CCCDN_EXTRACTOR_PATH: "${MEDIAFLOW_CCCDN_EXTRACTOR_PATH:-/extractor/video.m3u8}"
      MEDIAFLOW_EXTRACTOR_HLS_PATH: "${MEDIAFLOW_EXTRACTOR_HLS_PATH:-/extractor/video}"
      MEDIAFLOW_EXTRACTOR_HLS_HOSTS: "${MEDIAFLOW_EXTRACTOR_HLS_HOSTS:-}"
      MEDIAFLOW_REDIRECT_STREAM: "${MEDIAFLOW_REDIRECT_STREAM:-true}"
      MEDIAFLOW_API_PASSWORD: "${MEDIAFLOW_API_PASSWORD:-}"

      EUROSTREAMING_DELTABIT_MFP_FALLBACK: "${EUROSTREAMING_DELTABIT_MFP_FALLBACK:-false}"
      EUROSTREAMING_UPROT_FLARE_ENABLED: "${EUROSTREAMING_UPROT_FLARE_ENABLED:-false}"

      CB01_BASE_URL: "${CB01_BASE_URL:-https://cb01uno.bar}"
      CB01_DEBUG: "${CB01_DEBUG:-0}"
      CB01_TRACE: "${CB01_TRACE:-0}"
      CB01_IMPIT_STRATEGY: "${CB01_IMPIT_STRATEGY:-forward-only}"
      CB01_IMPIT_FORWARD_ENABLED: "${CB01_IMPIT_FORWARD_ENABLED:-1}"
      CB01_IMPIT_FORWARD_FALLBACK: "${CB01_IMPIT_FORWARD_FALLBACK:-0}"
      CB01_FORWARD_PROXY_FROM_MFP: "${CB01_FORWARD_PROXY_FROM_MFP:-0}"
      CB01_FORWARD_PROXY: "${CB01_FORWARD_PROXY:-https://krakenproxy.questoleviatanormio.dpdns.org/forward?url=}"
      CB01_USE_PROXY: "${CB01_USE_PROXY:-0}"
      CB01_PROXY_MAX_ATTEMPTS: "${CB01_PROXY_MAX_ATTEMPTS:-0}"
      CB01_IMPIT_DIRECT_FALLBACK: "${CB01_IMPIT_DIRECT_FALLBACK:-0}"
      CB01_STOP_ON_CHALLENGE: "${CB01_STOP_ON_CHALLENGE:-1}"
      CB01_SEARCH_TIMEOUT_MS: "${CB01_SEARCH_TIMEOUT_MS:-12000}"
      CB01_PAGE_TIMEOUT_MS: "${CB01_PAGE_TIMEOUT_MS:-12000}"
      CB01_SEARCH_TOTAL_BUDGET_MS: "${CB01_SEARCH_TOTAL_BUDGET_MS:-10500}"
      CB01_PAGE_TOTAL_BUDGET_MS: "${CB01_PAGE_TOTAL_BUDGET_MS:-14000}"
      CB01_IMPIT_FORWARD_TIMEOUT_MS: "${CB01_IMPIT_FORWARD_TIMEOUT_MS:-9500}"
      CB01_IMPIT_PROXY_TIMEOUT_MS: "${CB01_IMPIT_PROXY_TIMEOUT_MS:-1}"
      CB01_IMPIT_DIRECT_TIMEOUT_MS: "${CB01_IMPIT_DIRECT_TIMEOUT_MS:-1}"
      CB01_IMPIT_MAX_ATTEMPTS_TOTAL: "${CB01_IMPIT_MAX_ATTEMPTS_TOTAL:-1}"
      CB01_IMPIT_MAX_BROWSER_ATTEMPTS: "${CB01_IMPIT_MAX_BROWSER_ATTEMPTS:-1}"
      CB01_IMPIT_INNER_RETRY: "${CB01_IMPIT_INNER_RETRY:-0}"
      CB01_IMPIT_RETRY_ON_CHALLENGE: "${CB01_IMPIT_RETRY_ON_CHALLENGE:-0}"
      CB01_IMPIT_HTTP3: "${CB01_IMPIT_HTTP3:-0}"
      CB01_IMPIT_BROWSER: "${CB01_IMPIT_BROWSER:-chrome125}"

      UPROT_DEBUG: "${UPROT_DEBUG:-false}"

    depends_on:
      redis:
        condition: service_healthy
      flaresolverr:
        condition: service_healthy

    stop_grace_period: 20s

    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7000/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


  redis:
    image: redis:7-alpine
    container_name: leviathan-redis
    restart: unless-stopped
    init: true

    # Redis non viene esposto fuori: lo vede solo Leviathan nella rete docker-compose.
    command:
      [
        "redis-server",
        "--save", "",
        "--appendonly", "no",
        "--maxmemory", "${REDIS_MAXMEMORY:-128mb}",
        "--maxmemory-policy", "${REDIS_MAXMEMORY_POLICY:-allkeys-lfu}",
        "--lazyfree-lazy-eviction", "yes",
        "--lazyfree-lazy-expire", "yes",
        "--tcp-keepalive", "60",
        "--timeout", "0",
        "--databases", "1"
      ]

    expose:
      - "6379"

    mem_limit: ${REDIS_MEM_LIMIT:-192m}
    memswap_limit: ${REDIS_MEMSWAP_LIMIT:-256m}
    cpus: "${REDIS_CPUS:-0.35}"
    pids_limit: 128

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"


  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    init: true

    environment:
      LOG_LEVEL: "info"
      LOG_HTML: "false"
      CAPTCHA_SOLVER: "none"
      TZ: "Europe/Rome"
      BROWSER_TIMEOUT: "30000"
      MALLOC_ARENA_MAX: "2"

      # Quando FlareSolverr supera questa RAM, viene marcato unhealthy.
      # Autoheal lo riavvia automaticamente.
      FLARESOLVERR_HEALTH_MAX_MEM_MB: "620"

    ports:
      - "8191:8191"

    mem_limit: ${FLARESOLVERR_MEM_LIMIT:-700m}
    memswap_limit: ${FLARESOLVERR_MEMSWAP_LIMIT:-850m}
    cpus: "1.0"
    pids_limit: 256
    shm_size: "192m"

    security_opt:
      - no-new-privileges:true

    labels:
      autoheal: "true"
      autoheal.stop.timeout: "15"

    stop_grace_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test:
        - CMD-SHELL
        - |
          python - <<'PY'
          import os
          import sys
          import json
          import urllib.request

          max_mb = int(os.environ.get("FLARESOLVERR_HEALTH_MAX_MEM_MB", "820"))
          max_bytes = max_mb * 1024 * 1024

          usage = None

          for path in (
              "/sys/fs/cgroup/memory.current",
              "/sys/fs/cgroup/memory/memory.usage_in_bytes",
          ):
              try:
                  with open(path, "r") as f:
                      usage = int(f.read().strip())
                  break
              except Exception:
                  pass

          if usage is not None and usage > max_bytes:
              print(f"FlareSolverr memory too high: {usage // 1024 // 1024}MiB > {max_mb}MiB")
              sys.exit(1)

          try:
              payload = json.dumps({"cmd": "sessions.list"}).encode("utf-8")
              req = urllib.request.Request(
                  "http://127.0.0.1:8191/v1",
                  data=payload,
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )

              with urllib.request.urlopen(req, timeout=8) as res:
                  body = res.read(4096).decode("utf-8", "ignore")

              if '"status": "ok"' not in body and '"status":"ok"' not in body:
                  print("FlareSolverr API not ok")
                  sys.exit(1)

              sys.exit(0)

          except Exception as exc:
              print(f"FlareSolverr API check failed: {exc}")
              sys.exit(1)
          PY
      interval: 20s
      timeout: 10s
      retries: 2
      start_period: 60s




  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: unless-stopped
    init: true

    environment:
      AUTOHEAL_CONTAINER_LABEL: "autoheal"
      AUTOHEAL_INTERVAL: "10"
      AUTOHEAL_START_PERIOD: "60"
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: "15"
      TZ: "Europe/Rome"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    network_mode: "none"

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
